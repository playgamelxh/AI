version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: baokao_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: baokao
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: baokao_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_DSN=root:root@tcp(db:3306)/baokao?charset=utf8mb4&parseTime=True&loc=Local

  frontend:
    build: ./frontend
    container_name: baokao_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
